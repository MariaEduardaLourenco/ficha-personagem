<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha de personagem</title>
    <link rel="stylesheet" href="ficha-personagem.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="container-geral" id="ficha">
        <label for="container-geral">Dadinhos - ficha de personagem</label>
        <div class="container-formulario">
            <form id="formulario">
                <div class="secao_p">
                    <div class="nome">
                        <label for="nome">Nome</label><br>
                        <input type="text" name="nome" id="nome" required><br>
                    </div>

                    <div class="nivel">
                        <label for="nivel">Nível</label>
                        <select name="nivel" id="nivel" required>
                            <option value="1" selected>1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                        </select>
                    </div>

                    <div class="imagem">
                        <img src="contorno-do-cubo-de-dados.png" alt="dados_ficha-personagem">
                        <img src="contorno-do-cubo-de-dados.png" alt="dados_ficha-personagem">
                    </div>
                </div>

                <div class="secao_s">
                    <div class="container-pv">
                        <div class="protecao">
                            <label for="protecao">Proteção</label>
                            <input type="number" name="protecao" id="protecao" placeholder="1" max="11" min="1">
                        </div>
                        <div class="vida">
                            <label>Vida</label>
                            <div class="vidas">
                                <input type="number" name="vida_atual" id="vida_atual" placeholder="0" max="30" title="vida atual" required>
                                <input type="number" name="vida_total" id="vida_total" placeholder="20" max="30" min="20" title="vida total" required>
                            </div>
                        </div>
                        <div class="habilidade">
                            <label>Habilidade</label>
                            <div class="habilidades">
                                <select class="habilidade_tipo" name="habilidade_tipo" id="habilidade_tipo" required>
                                    <option value="dano" selected>Dano</option>
                                    <option value="cura">Cura</option>
                                    <option value="movimento">Movimento</option>
                                    <option value="controle">Controle</option>
                                </select>
                                <select class="h_dado" name="h_dado" id="h_dado" required>
                                    <option value="1" selected>1</option>
                                    <option value="2">2</option>
                                </select>
                            </div>
                            <input type="text" name="habilidade_nome" id="habilidade_nome" title="Nome da habilidade" placeholder="Bola de Fogo...">
                        </div>
                    </div>

                    <div class="atributo">
                        <label>Atributos</label>
                        <div class="atributos" title="1 ponto padrão + 3 pontos extras para distribuir; não podem ser maiores que 3.">
                            <div class="atributo-item">
                                <label for="forca">Força</label>
                                <select name="forca" id="forca" required>
                                    <option value="1" selected>1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                </select>
                            </div>
                            <div class="atributo-item">
                                <label for="carisma">Carisma</label>
                                <select name="carisma" id="carisma" required>
                                    <option value="1" selected>1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                </select>
                            </div>
                            <div class="atributo-item">
                                <label for="inteligencia">Inteligência</label>
                                <select name="inteligencia" id="inteligencia" required>
                                    <option value="1" selected>1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                </select>
                            </div>
                            <div class="atributo-item">
                                <label for="velocidade">Velocidade</label>
                                <select name="velocidade" id="velocidade" required>
                                    <option value="1" selected>1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="foto">
                        <label for="foto">Personagem</label>
                        <input type="file" name="foto" id="foto" accept="image/png, image/jpeg, image/pdf">
                    </div>
                </div>

                <div class="secao_t">
                    <div class="descricao">
                        <label for="descricao">Descrição</label>
                        <textarea name="descricao" id="descricao" placeholder="Gosta de coisas brilhantes..."></textarea>
                    </div>
                    <div class="equipamento">
                        <label for="equipamento">Equipamento</label>
                        <div class="area">
                            <textarea name="equipamento" id="equipamento" placeholder="1. Capacete super legal...&#10;2. Super espada...&#10;3. Poção de vida...&#10;4. Escudo mágico..."></textarea>
                            
                            <div class="equipamento-selects">
                                <div class="select-item">
                                    <select name="equipamento_1" id="equipamento_1" onchange="selecionarIcone(1)">
                                        <option value="">Slot</option>
                                    </select>
                                </div>
                                <div class="select-item">
                                    <select name="equipamento_2" id="equipamento_2" onchange="selecionarIcone(2)">
                                        <option value="">Slot</option>
                                    </select>
                                </div>
                                <div class="select-item">
                                    <select name="equipamento_3" id="equipamento_3" onchange="selecionarIcone(3)">
                                        <option value="">Slot</option>
                                    </select>
                                </div>
                                <div class="select-item">
                                    <select name="equipamento_4" id="equipamento_4" onchange="selecionarIcone(4)">
                                        <option value="">Slot</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div><br>

                <button type="button" onclick="gerarPDF()">Criar personagem</button>
            </form>
        </div>
    </div>
    <script src="ficha-personagem.js"></script>
</body>
</html>
